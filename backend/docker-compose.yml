services: 
  database:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment: 
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASSWORD}
      POSTGRES_DB: ${DBNAME}
    ports:
      - 127.0.0.1:5432:5432
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    env_file: 
      - .env

  server: 
    build: 
      context: .
      dockerfile: Dockerfile
    develop: 
      watch: 
        - path: ./package.json
          action: rebuild
        - path: ./package-lock.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

    image: backend
    ports: 
      - 3000:3000
    volumes: 
      - ./src:/usr/src/app/src
    depends_on:
      - database

volumes: 
  postgres_data: