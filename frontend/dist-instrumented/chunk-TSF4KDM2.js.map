<section class="care-page care-dot-grid sidebar-page" aria-label="Dashboard principale">
	<header class="care-page__hero">
		<div>
			<h1 class="care-title">Dashboard</h1>
			<p class="care-subtitle">Controlla in un colpo d'occhio stato appartamenti, allarmi e utenti del turno.</p>
		</div>

		<p class="care-page__header-badge">
			<span class="care-page__header-badge-dot" aria-hidden="true"></span>
			Supervisione attiva
		</p>
	</header>

	<section class="dashboard-page__cards flex flex-col gap-5" aria-label="Azioni rapide dashboard">
		<article class="care-panel dashboard-page__card">
			<h2 class="dashboard-page__card-title">Gestione allarmi</h2>
			<p class="dashboard-page__card-text">Verifica gli eventi aperti e le regole di notifica configurate.</p>
	  		<app-alarms-widget></app-alarms-widget>
		</article>

		<article class="care-panel dashboard-page__card">
			<h2 class="dashboard-page__card-title">Monitor dispositivi</h2>
			<p class="dashboard-page__card-text">Accedi allo stato live delle stanze e alla telemetria principale.</p>
			<app-analytics-widget></app-analytics-widget>
		</article>
	</section>
</section>
