services: 
  database:
    image: timescale/timescaledb:latest-pg18
    container_name: postgres-timescale
    restart: unless-stopped
    environment: 
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASSWORD}
      POSTGRES_DB: ${DBNAME}
    ports:
      - 127.0.0.1:5434:5432
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    env_file: 
      - .env
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DBUSER} -d ${DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server: 
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: backend
    volumes: 
      - ./backend:/app
      - /app/node_modules
    command: npm run start
    depends_on:
      database:
        condition: service_healthy
    env_file: 
      - .env
    networks:
      - backend-net
      - frontend-net
  
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist/frontend/browser:/usr/share/nginx/html
    depends_on:
      - server
    networks:
      - frontend-net

networks:
  backend-net:
  frontend-net:

volumes: 
  postgres_data: