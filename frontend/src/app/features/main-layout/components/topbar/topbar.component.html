<section class="flex items-center justify-between p-4 bg-white border-b border-black h-full">
    
    <div class="flex items-center gap-4">
        <img src="logo.png" alt="Logo" class="w-10 h-10">
        <div>
            <h1 class="font-bold text-2xl leading-tight">View4Life</h1>
            <nav class="text-xs text-gray-500">breadcrumb</nav>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <button class="p-2 border border-black">
            Notifiche
        </button>

        <div class="flex items-center gap-3">
            <img src="user-avatar.png" class="w-8 h-8 border border-black">
            <div class="text-sm leading-none">
                <p>{{user.firstName}}</p>
                <p >{{user.lastName}}</p>
            </div>
        </div>

        <button 
            (click)="logoutClicked.emit()" 
            class="px-4 py-2 border">
            Logout
        </button>
    </div>

</section>
