<section class="topbar-shell">
    <div class="topbar-brand">
        <button
            type="button"
            class="hamburger-btn"
            aria-label="Apri menu"
            (click)="hamburgerClicked.emit()"
        >☰</button>
        <img src="logo.png" alt="" class="topbar-logo">
        <div>
            <h1 class="topbar-title">View4Life</h1>
            <nav class="topbar-breadcrumb" aria-label="Breadcrumb">
                <ol class="flex items-center gap-1 text-sm">
                    @for (crumb of breadcrumbs$ | async; track crumb.url; let last = $last) {
                    <li class="flex items-center gap-1">
                        @if (!last) {
                        <a [routerLink]="crumb.url" class="hover:text-amber-600">{{ crumb.label }}</a>
                        <span class="opacity-40">/</span>
                        } @else {
                        <span class="font-semibold">{{ crumb.label }}</span>
                        }
                    </li>
                    }
                </ol>
            </nav>
        </div>
    </div>

    <div class="topbar-actions">
        <button type="button" class="topbar-button topbar-button-neutral notification-btn" aria-label="Visualizza notifiche">
            <img src="notification.png" class="topbar-avatar" alt="">
        </button>

        <button
            type="button"
            aria-label="Apri profilo"
            (click)="onProfileClick()"
            [disabled]="!canOpenProfile"
            [attr.title]="canOpenProfile ? 'Apri pannello profilo' : 'Solo amministratore'"
            class="topbar-profile topbar-profile--desktop"
            [class.profile-active]="isProfileActive && canOpenProfile"
            [class.bg-amber-300]="isProfileActive && canOpenProfile"
            [class.profile-disabled]="!canOpenProfile"
        >
            <img src="user-avatar.png" class="topbar-avatar" alt="">
            <div class="topbar-user-meta">
            </div>
        </button>
    </div>
</section>
