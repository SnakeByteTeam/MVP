<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <input type="text" formControlName="username" (input)="onUsernameChange($any($event.target).value)"
    placeholder="Username" />
  <input type="password" formControlName="password" (input)="onPasswordChange($any($event.target).value)"
    placeholder="Password" />

  <button type="submit" [disabled]="isLoading">Accedi</button>

  @if (errorType) {
  <p>{{ errorType }}</p>
  }
</form>
