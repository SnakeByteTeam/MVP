
<div class="p-4 bg-transparent rounded-3xl">
    
<div class="max-w-md p-4">
    <label for="apartment-select" 
           class="block mb-2 text-xl font-bold text-slate-700">
        Appartamento Monitorato
    </label>
    
    
    <div class="relative group" *ngIf="selectedApartmentId$ | async as selectedId">
        <select 
            [value]="selectedId"
            id="apartment-select" 
            (change)="onApartmentChange($event)"
            class="block w-full cursor-pointer appearance-none rounded-xl border border-slate-200 bg-white/70 px-4 py-3 font-body text-sm font-medium text-slate-700 shadow-sm backdrop-blur-sm transition-all focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 group-hover:border-slate-300">
            
            <option *ngFor="let apt of apartments$ | async" [value]="apt.id" class="bg-white text-slate-700">
                {{ apt.name }} - {{ apt.id }}
            </option>
            
        </select>
        
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-amber-500">
            <svg class="h-4 w-4 stroke-[3]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
        </div>
    </div>
</div>

<div *ngIf="analytics | async as data; else loading" 
class="grid grid-cols-6 gap-4 w-full bg-transparent gap-10 p-4">

    <app-energy-consumption-chart 
        *ngIf="getChartByMetric(data, 'plant-consumption') as info"
        class="col-span-6 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-energy-consumption-chart>

    <app-alarms-sent-resolved-chart 
        *ngIf="getChartByMetric(data, 'ward-resolved-alarm') as info"
        class="col-span-6 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-alarms-sent-resolved-chart>

    <div *ngIf="selectedApartment$ | async as currentApt"
     class="col-span-6 2xl:col-span-2 w-full h-full">
        <plant-overview
        [apartment]="currentApt">
        </plant-overview>
    </div>

</div>
</div>


<ng-template #loading>
    <div class="flex items-center justify-center h-screen bg-slate-50">
        <p class="text-slate-500 animate-pulse font-medium text-lg">Caricamento dati in corso...</p>
    </div>
</ng-template>
