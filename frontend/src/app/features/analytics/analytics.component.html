<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

<style>
  :root {
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { font-family: var(--font-body); }
  .font-display { font-family: var(--font-display); }

  .dot-grid {
    background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
    background-size: 22px 22px;
  }
  
</style>
<div class="dot-grid ">

<div class="max-w-md mb-6 p-4">
    <label for="apartment-select" 
           class="block mb-2 text-xl font-bold text-slate-700">
        Appartamento Monitorato
    </label>
    
    <div class="relative group">
        <select 
            id="apartment-select" 
            (change)="onApartmentChange($event)"
            class="block w-full cursor-pointer appearance-none rounded-xl border border-slate-200 bg-white/70 px-4 py-3 font-body text-sm font-medium text-slate-700 shadow-sm backdrop-blur-sm transition-all focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 group-hover:border-slate-300">
            
            <option *ngFor="let apt of apartments$ | async" [value]="apt.id" class="bg-white text-slate-700">
                {{ apt.name }}
            </option>
            
        </select>
        
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-amber-500">
            <svg class="h-4 w-4 stroke-[3]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
        </div>
    </div>
</div>

<div *ngIf="analytics | async as data; else loading" 
class="grid grid-cols-6 gap-4 w-full min-h-screen bg-transparent gap-10 p-4 content-start ">

    <app-energy-consumption-chart 
        class="col-span-6 2xl:col-span-3 w-full"
        [chartInfo]="getChartByMetric(data,'plant-consumption')!">
    </app-energy-consumption-chart>

    <app-temperature-variations-chart 
        class="col-span-6 2xl:col-span-3"
        [chartInfo]="getChartByMetric(data,'thermostat-temperature')!">
    </app-temperature-variations-chart>

    <app-alarm-frequency-chart 
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="getChartByMetric(data,'ward-alarms-frequency')!">
    </app-alarm-frequency-chart>

    <app-alarms-sent-resolved-chart 
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="getChartByMetric(data,'ward-resolved-alarm')!">
    </app-alarms-sent-resolved-chart>

    <app-fall-frequency-chart 
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="getChartByMetric(data,'ward-falls')!">
    </app-fall-frequency-chart>

    <app-plant-anomalies-chart 
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="getChartByMetric(data,'plant-anomalies')!">
    </app-plant-anomalies-chart>

    <app-presence-detection-chart 
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="getChartByMetric(data,'sensor-presence')!">
    </app-presence-detection-chart>

    <app-prolonged-presence-chart 
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="getChartByMetric(data,'sensor-long-presence')!">
    </app-prolonged-presence-chart>



</div>


<ng-template #loading>
    <div class="flex items-center justify-center h-screen bg-slate-50">
        <p class="text-slate-500 animate-pulse font-medium text-lg">Caricamento dati in corso...</p>
    </div>
</ng-template>
</div>
