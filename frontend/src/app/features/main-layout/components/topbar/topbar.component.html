<section class="topbar-shell">
    <div class="topbar-brand">
        <img src="logo.png" alt="Logo" class="topbar-logo">
        <div>
            <h1 class="topbar-title">View4Life</h1>
            <nav class="topbar-breadcrumb">Breadcrumb?</nav>
        </div>
    </div>

    <div class="topbar-actions">
        <button type="button" class="topbar-button topbar-button-neutral">
            Notifiche
        </button>

        <button
            type="button"
            aria-label="Apri profilo"
            (click)="onProfileClick()"
            [disabled]="!canOpenProfile"
            [attr.title]="canOpenProfile ? 'Apri pannello profilo' : 'Solo amministratore'"
            class="topbar-profile"
            [class.profile-active]="isProfileActive && canOpenProfile"
            [class.bg-amber-300]="isProfileActive && canOpenProfile"
            [class.profile-disabled]="!canOpenProfile"
        >
            <img src="user-avatar.png" class="topbar-avatar" alt="Avatar utente">
            <div class="topbar-user-meta">
                <p>{{user.firstName}}</p>
                <p>{{user.lastName}}</p>
            </div>
        </button>

        <button
            type="button"
            (click)="logoutClicked.emit()"
            class="topbar-button topbar-button-logout"
        >
            Logout
        </button>
    </div>
</section>
