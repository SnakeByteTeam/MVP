<article [class]="cardClass()" aria-label="Allarme {{ alarm().alarmName }}">
    <header class="alarm-item__header flex items-start justify-between gap-3">
        <div class="min-w-0 flex items-center gap-3">
            <div [class]="priorityIconClass()">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                    aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v3.75m9-6.75A9 9 0 1112 3a9 9 0 019 0zM12 16.5h.008v.008H12V16.5z" />
                </svg>
            </div>

            <div class="min-w-0">
                <h2 class="alarm-item__title truncate text-sm font-bold text-slate-900 md:text-base">{{
                    alarm().alarmName }}</h2>
                <p class="mt-0.5 text-xs text-slate-500">Regola: {{ alarm().alarmRuleId }}</p>
            </div>
        </div>

        <span [class]="priorityBadgeClass()">
            <span [class]="priorityDotClass()"></span>
            {{ priorityUi().label }}
        </span>
    </header>

    <dl class="alarm-item__meta mt-1 grid grid-cols-1 gap-2 sm:grid-cols-2">
        <div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2">
            <dt class="text-[11px] font-semibold uppercase tracking-wide text-slate-500">Priorità</dt>
            <dd class="mt-1 text-sm font-semibold text-slate-700">{{ priorityUi().label }}</dd>
        </div>

        <div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2">
            <dt class="text-[11px] font-semibold uppercase tracking-wide text-slate-500">Attivo da</dt>
            <dd class="mt-1 text-sm font-semibold text-slate-700">{{ alarm().activationTime | elapsedTime }}</dd>
        </div>
    </dl>

    <div class="alarm-item__actions mt-2 flex items-center justify-between gap-3">
        @if (isResolving()) {
        <span class="alarm-item__status inline-flex items-center gap-2 text-xs font-medium text-sky-700"
            aria-live="polite">
            <span class="h-2 w-2 animate-pulse rounded-full bg-sky-500"></span>
            Operazione in corso
        </span>
        } @else {
        <span class="text-xs text-slate-400">In attesa di risoluzione</span>
        }

        <button type="button" (click)="onResolveClick()" [disabled]="isResolving()"
            [attr.aria-busy]="isResolving() ? 'true' : null"
            class="inline-flex items-center gap-1.5 rounded-lg border border-rose-600 bg-rose-600 px-3 py-2 text-xs font-semibold text-white shadow-sm transition hover:bg-rose-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-rose-500 disabled:cursor-not-allowed disabled:border-slate-300 disabled:bg-slate-200 disabled:text-slate-400">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            {{ isResolving() ? 'Risoluzione...' : 'Risolvi' }}
        </button>
    </div>
</article>
