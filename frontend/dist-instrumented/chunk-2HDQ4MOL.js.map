<article
    class="notification-card group relative overflow-hidden rounded-[1.5rem] border border-amber-200 bg-white p-4 shadow-[0_14px_36px_-30px_rgba(15,23,42,0.55)] transition duration-200 hover:-translate-y-0.5 hover:border-amber-300 hover:shadow-[0_20px_48px_-36px_rgba(15,23,42,0.65)]"
    [class.notification-card--highlighted]="isHighlighted()"
    [attr.id]="'notification-' + notification().notificationId"
    [attr.aria-label]="ariaLabel()">
    @if (isResolved()) {
    <div class="absolute inset-y-0 left-0 w-1.5 bg-gradient-to-b from-emerald-500 via-emerald-400 to-lime-300"></div>
    } @else {
    <div class="absolute inset-y-0 left-0 w-1.5 bg-gradient-to-b from-amber-500 via-amber-400 to-yellow-300"></div>
    }

    <div class="flex items-start gap-4 pl-3 sm:pl-4">
        <div
            class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-amber-50 text-amber-700 ring-1 ring-inset ring-amber-100">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8"
                aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 17h5l-1.4-1.4a2 2 0 0 1-.6-1.4V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0" />
            </svg>
        </div>

        <div class="min-w-0 flex-1">
            <div class="flex flex-wrap items-start justify-between gap-2">
                <div class="notification-item__title-wrap inline-flex items-center gap-2">
                    @if (priority(); as notificationPriority) {
                    <app-alarm-priority-indicator [priority]="notificationPriority"></app-alarm-priority-indicator>
                    }

                    <h2 class="notification-item__title font-display text-base font-semibold leading-6 text-slate-900 sm:text-lg">
                        {{ displayTitle() }}
                    </h2>
                </div>

                <div class="inline-flex items-center gap-2">
                    <time
                        class="notification-item__time inline-flex shrink-0 items-center rounded-full border border-amber-200 bg-amber-50 px-2.5 py-1 text-xs font-medium text-amber-700"
                        [attr.datetime]="sentAt()">
                        {{ sentAt() | elapsedTime }}
                    </time>

                    @if (showRemoveAction()) {
                    <button
                        type="button"
                        (click)="onRemove()"
                        aria-label="Rimuovi notifica"
                        class="notification-item__remove cursor-pointer inline-flex h-7 w-7 items-center justify-center rounded-lg border border-amber-200 bg-amber-50 text-amber-700 transition-colors hover:border-amber-300 hover:bg-amber-100"
                    >
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    }
                </div>
            </div>

            <p class="mt-2 text-sm leading-6 text-slate-600">
                Notifica di sistema registrata nel feed del reparto.
            </p>
        </div>
    </div>
</article>
