<div class="flex">

<div [class.w-[70%]]="chartInfo.suggestion.isSuggestion" 
       [class.w-full]="!chartInfo.suggestion.isSuggestion"
       class="block h-full p-4 bg-white p-4  rounded-tl-3xl rounded-bl-3xl">
  <div class="border-b pb-1 mb-5">
    <h1 class="font-bold">{{chartInfo.title}}</h1>
    <h2>Appartamento</h2>
  </div>

  <canvas baseChart
    [data]="renderedChartData"
    [options]="chartOptions"
    [type]="chartType">
  </canvas>

</div>

<div *ngIf="chartInfo.suggestion.isSuggestion" class="w-[30%] bg-white  p-1 rounded-tr-2xl rounded-br-2xl">
  <div class="p-4 rounded-2xl bg-[rgb(255,220,50)] border border-[rgb(140,116,0)]">
    <p class="font-bold">SUGGERIMENTO</p>
    <p>{{chartInfo.suggestion.description}}</p>
  </div>
</div>

</div>
