services: 
  database:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment: 
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASSWORD}
      POSTGRES_DB: ${DBNAME}
    ports:
      - 127.0.0.1:5434:5432
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    env_file: 
      - .env

  server: 
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: backend
    ports: 
      - 3000:3000
    volumes: 
      - ./backend/src:/app/src
    command: npm run start:dev
    depends_on:
      - database
    env_file: 
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend
    ports:
      - 4200:4200
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - server

volumes: 
  postgres_data: