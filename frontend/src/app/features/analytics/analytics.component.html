<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

<style>
  :root {
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { font-family: var(--font-body); }
  .font-display { font-family: var(--font-display); }

  .dot-grid {
    background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
    background-size: 22px 22px;
  }
  
</style>

<div class="dot-grid">
<div class="p-4">
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
        <label for="apartment-select" class="text-2xl font-bold text-slate-700">
            Appartamento Monitorato
        </label>
        <button
            (click)="onRefresh()"
            class="flex items-center gap-2 rounded-md border border-amber-300 bg-amber-300 px-3 py-2 text-sm font-medium text-slate-900 hover:bg-amber-200 transition whitespace-nowrap mb-4">
            <img class="w-6 h-6" src="reload.png" alt="">
            Aggiorna grafici
        </button>
    </div>
    <div class="relative group z-0" *ngIf="selectedApartmentId$ | async as selectedId">
        <select 
            [value]="selectedId"
            id="apartment-select" 
            (change)="onApartmentChange($event)"
            class="block w-full cursor-pointer appearance-none rounded-xl border border-slate-200 bg-white/70 px-4 py-3 font-body text-sm font-medium text-slate-700 transition-all focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 group-hover:border-slate-300">
            
            <option *ngFor="let apt of apartments$ | async" [value]="apt.id" class="bg-white text-slate-700">
                {{ apt.name }} - {{ apt.id }}
            </option>
            
        </select>
        
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-amber-500">
            <svg class="h-4 w-4 stroke-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
        </div>
    </div>
</div>

<div *ngIf="analytics | async as data; else loading" 
class="grid grid-cols-6 w-full min-h-screen bg-transparent gap-10 p-4 content-start ">

    <app-energy-consumption-chart 
        *ngIf="getChartByMetric(data, 'plant-consumption') as info"
        class="col-span-6 2xl:col-span-3 w-full"
        [chartInfo]="info"
        [showSuggestions]="true">
    </app-energy-consumption-chart>

    <app-temperature-variations-chart 
        *ngIf="getChartByMetric(data, 'thermostat-temperature') as info"
        class="col-span-6 2xl:col-span-3"
        [chartInfo]="info"
        [showSuggestions]="true">
    </app-temperature-variations-chart>

    <app-alarm-frequency-chart 
        *ngIf="getChartByMetric(data, 'ward-alarms-frequency') as info"
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-alarm-frequency-chart>

    <app-alarms-sent-resolved-chart 
        *ngIf="getChartByMetric(data, 'ward-resolved-alarm') as info"
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-alarms-sent-resolved-chart>

    <app-fall-frequency-chart 
        *ngIf="getChartByMetric(data, 'ward-falls') as info"
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-fall-frequency-chart>

    <app-plant-anomalies-chart 
        *ngIf="getChartByMetric(data, 'plant-anomalies') as info"
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-plant-anomalies-chart>

    <app-presence-detection-chart 
        *ngIf="getChartByMetric(data, 'sensor-presence') as info"
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-presence-detection-chart>

    <app-prolonged-presence-chart 
        *ngIf="getChartByMetric(data, 'sensor-long-presence') as info"
        class="col-span-6 lg:col-span-3 2xl:col-span-2"
        [chartInfo]="info"
        [showSuggestions]="false">
    </app-prolonged-presence-chart>

</div>


<ng-template #loading>
    <div class="flex items-center justify-center h-screen bg-slate-50">
        <p class="text-slate-500 animate-pulse font-medium text-lg">Caricamento dati in corso...</p>
    </div>
</ng-template>
</div>
