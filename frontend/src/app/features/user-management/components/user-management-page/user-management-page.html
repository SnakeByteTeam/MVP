<div class="management-layout">

    <header class="page-header">
        <h1>Gestione Operatori Sanitari</h1>
    </header>

    <div class="content-grid">
        <aside class="sidebar">
            <app-create-user-form [errorType]="formError()" (formSubmit)="onFormSubmit($event)">
            </app-create-user-form>
        </aside>

        <main class="main-content">
            @if (users$ | async; as users) {
            <app-user-list [users]="users" (deleteUser)="onUserDeleted($event)">
            </app-user-list>
            } @else {
            <div class="loading-spinner">
                <p>Caricamento operatori in corso...</p>
            </div>
            }
        </main>
    </div>

</div>

@if (createdResponse(); as response) {
<app-user-created-dialog [response]="response" (closed)="onDialogClosed()">
</app-user-created-dialog>
}
