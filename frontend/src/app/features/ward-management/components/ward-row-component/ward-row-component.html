@if (plant(); as currentPlant) {
<div class="flex w-full items-center justify-between gap-2">
    <div class="min-w-0">
        <span class="block truncate text-sm font-semibold text-neutral-900">{{ currentPlant.name }}</span>
        <span class="mt-0.5 inline-flex rounded-full px-2 py-0.5 text-xs font-medium"
            [class]="currentPlant.isEnabled ? 'mt-0.5 inline-flex rounded-full border border-emerald-500 bg-emerald-100 px-2 py-0.5 text-xs font-semibold text-emerald-800' : 'mt-0.5 inline-flex rounded-full border border-amber-500 bg-amber-100 px-2 py-0.5 text-xs font-semibold text-amber-800'">
            {{ currentPlant.isEnabled ? 'Attivo' : 'Disattivo' }}
        </span>
    </div>
    <button type="button" (click)="onToggle()"
        [attr.aria-label]="(currentPlant.isEnabled ? 'Disabilita' : 'Abilita') + ' appartamento ' + currentPlant.name"
        class="shrink-0 rounded-md border border-neutral-600 bg-white px-2 py-0.5 text-xs font-semibold text-neutral-800 hover:bg-neutral-100">
        {{ currentPlant.isEnabled ? 'Disabilita' : 'Abilita' }}
    </button>
</div>
}
