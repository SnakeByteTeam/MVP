<section class="rounded-2xl border border-slate-300 bg-slate-100/95 p-3 shadow-sm">
    <header class="mb-2 flex items-center justify-between border-b border-slate-400 pb-2">
        <h2 class="text-base font-bold text-slate-900">{{ title() }}</h2>

        @if (showCreateButton()) {
        <button type="button" (click)="onCreateRequest()" [attr.aria-label]="createButtonAriaLabel()"
            class="inline-flex h-6 w-6 items-center justify-center rounded-full border border-emerald-700 bg-emerald-600 text-base font-bold leading-none text-white transition hover:bg-emerald-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600">
            +
        </button>
        }
    </header>

    <div class="overflow-x-auto">
        <table class="min-w-full border-separate border-spacing-y-2 text-sm" [attr.aria-label]="caption()">
            <caption class="sr-only">{{ caption() }}</caption>
            <thead>
                <tr class="text-left text-xs font-semibold uppercase tracking-wide text-slate-700">
                    @for (column of columns(); track column.id) {
                    <th scope="col" class="px-3 py-1.5 first:pl-4 last:pr-4">{{ column.label }}</th>
                    }
                </tr>
            </thead>
            <tbody>
                <ng-content />
            </tbody>
        </table>
    </div>
</section>
