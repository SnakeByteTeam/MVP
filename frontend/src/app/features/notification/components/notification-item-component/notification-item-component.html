<article
    class="notification-card group relative overflow-hidden rounded-[1.5rem] border border-slate-200 bg-white p-4 shadow-[0_14px_36px_-30px_rgba(15,23,42,0.55)] transition duration-200 hover:-translate-y-0.5 hover:border-teal-300 hover:shadow-[0_20px_48px_-36px_rgba(15,23,42,0.65)]"
    [attr.aria-label]="ariaLabel()">
    <div class="absolute inset-y-0 left-0 w-1.5 bg-gradient-to-b from-teal-500 via-cyan-500 to-emerald-500"></div>

    <div class="flex items-start gap-4 pl-3 sm:pl-4">
        <div
            class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-teal-50 text-teal-700 ring-1 ring-inset ring-teal-100">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8"
                aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 17h5l-1.4-1.4a2 2 0 0 1-.6-1.4V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0" />
            </svg>
        </div>

        <div class="min-w-0 flex-1">
            <div class="flex flex-wrap items-start justify-between gap-2">
                <h2 class="font-display text-base font-semibold leading-6 text-slate-900 sm:text-lg">
                    {{ notification().title }}
                </h2>

                <time
                    class="inline-flex shrink-0 items-center rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-xs font-medium text-slate-600"
                    [attr.datetime]="sentAt()">
                    {{ sentAt() | elapsedTime }}
                </time>
            </div>

            <p class="mt-2 text-sm leading-6 text-slate-600">
                Notifica di sistema registrata nel feed del reparto.
            </p>
        </div>
    </div>
</article>
